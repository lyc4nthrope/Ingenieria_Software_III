# Fly.io — NØSEE Prometheus
# Docs: https://fly.io/docs/reference/configuration/
#
# Cambia "nosee-prometheus" por un nombre único globalmente (ej: nosee-prometheus-tuapellido).
# La URL pública será: https://<app>.fly.dev

app = "nosee-prometheus-crisdani"
primary_region = "gru"   # São Paulo — debe estar en la misma región que el metrics-server

[build]
  dockerfile = "Dockerfile"

# Volumen persistente para que Prometheus no pierda los datos históricos al reiniciar.
# Se crea una sola vez con: flyctl volumes create prometheus_data --size 3 --region gru
[mounts]
  source = "prometheus_data"
  destination = "/prometheus"

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
